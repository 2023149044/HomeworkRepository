<!DOCTYPE html>
<html>
<head> 
    <title>회원가입 페이지</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>
    <p><a href="login.html">로그인</a> | <a href = "signup.html">회원가입</a></p>
    <form>
        <fieldset>
            <table>
                <tr>
                    <td><label for = "name">이름:</label></td>
                    <td><input type = "text" id = "name" name = "name" autofocus required autocomplete="on"></td>
                </tr>
                <tr>
                    <td><label for = "birthday">생일:</label></td>
                    <td><input type = "date" id = "birthday" name = "birthday" required autocomplete="on"></td>
                </tr>
                <tr>
                    <td>성별:</td>
                    <td><input type = "radio" id = "male" name = "sex" value = "male"><label for = "male">남성</label>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                    <input type = "radio" id = "female" name = "sex" value = "female"><label for = "female">여성</label>
                    </td>
                </tr>
                <tr>
                    <td><label for = "haknyeon">학년:</label></td>
                    <td><input type = "number" id = "haknyeon" name = "haknyeon" step="1" min="1" max="4" required autocomplete="on"></td>
                </tr>
                <tr>
                    <td><label for = "userid">아이디:</label></td>
                    <td><input type = "text" id = "userid" name = "userid" placeholder="아이디를 입력하세요" required autocomplete = "on"></td>
                </tr>
                <tr>
                    <td><label for = "userpw">비밀번호:</label></td>
                    <td><input type = "password" id = "userpw" name = "userpw" placeholder="비밀번호를 입력하세요" required autocomplete= "off"></td>
                </tr>
                <tr>
                    <td><label for = "email">이메일:</label></td>
                    <td><input type = "email" id = "email" name = "email" required autocomplete="on"></td>
                </tr>
                <tr>
                    <td><label for = "question">보안 질문:</label></td>
                    <td>
                        <select id = "question" name = "question" required autocomplete = "on">
                            <option value = "">질문을 선택하세요</option>
                            <option value = "friend">학창 시절 가장 친한 친구의 이름은?</option>
                            <option value = "school">출신 초등학교는?</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><label for = "answer">답변: </label></td>
                    <td><input type = "text" id = "answer" name = "answer" required autocomplete="on"></td>
                </tr>
                <tr>
                    <td><button type = "submit" class = button_green>Signup</button>
                    <button type = "reset" class = button_red>Cancel</button></td>
                </tr>
            </table>
        </fieldset>
    </form>

</body>

</html>
