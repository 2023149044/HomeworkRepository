<!DOCTYPE html>
<html>
<head>
    <title>로그인 페이지</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>
    <p><a href = "login.html">로그인</a> | <a href = "signup.html">회원가입</a></p>
    <form>
       <fieldset>
            <table>
                <tr>
                    <td><label for = "userid">아이디:</label></td>
                    <td><input type = "text" id = "userid" autofocus required autocomplete="on"></td>
                </tr>
                <tr>
                    <td><label for = "userpw">비밀번호:</label></td>
                    <td><input type = "password" id = "userpw" required autocomplete="off"></td>
                </tr>
                <tr>
                    <td>
                        <button type = "submit" class = "button_green">Login</button>
                        <button type = "reset" class = "button_red">Cancel</button>
                    </td>
                </tr>
            </table>
        </fieldset>
    </form>
</body>
</html>
